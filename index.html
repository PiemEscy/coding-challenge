<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Centering</title>
    <style>


        .parent {
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: lightblue;
        }

        .child {
            width: 50%;
            margin: auto;
            background: gray;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">I am centered in Flexbox!</div>
    </div>
</body>
</html>
